site_name: Sujit Noronha
site_description: ML Engineer | LLM Optimization | Edge AI | MLOps
site_author: Sujit Noronha
site_url: https://sujitnoronha.com

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sujitnoronha
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/sujitnoronha

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - About: about.md
  - Projects: projects.md
  - Blog: blog/
  - Contact: contact.md
